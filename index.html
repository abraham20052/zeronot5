<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كازينو النجوم الملكي</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b131a;
            --card-bg: #15222e;
            --accent-gold: #f1c40f;
            --accent-glow: rgba(241, 196, 15, 0.4);
            --text-color: #ffffff;
            --btn-green: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
            user-select: none;
        }

        /* الهيدر وعلامة الكازينو */
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }

        .header h1 {
            font-size: 28px;
            margin: 0;
            color: var(--accent-gold);
            text-shadow: 0 0 20px var(--accent-glow);
            letter-spacing: 1px;
        }

        .header p {
            font-size: 13px;
            color: #8a9aa8;
            margin: 5px 0 0 0;
        }

        /* لوحة معلومات اللاعب */
        .user-card {
            background: linear-gradient(135deg, var(--card-bg) 0%, #1a2d3d 100%);
            border: 1px solid rgba(241, 196, 15, 0.2);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: var(--accent-gold);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
        }

        .balance-box {
            text-align: left;
        }

        .balance-label {
            font-size: 11px;
            color: #8a9aa8;
            display: block;
        }

        .balance-value {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-gold);
        }

        /* قسم الألعاب */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e2e8f0;
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 20px 15px;
            text-align: center;
            transition: transform 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .game-card:active {
            transform: scale(0.96);
            border-color: var(--accent-gold);
        }

        .game-icon {
            font-size: 36px;
            margin-bottom: 10px;
            display: block;
        }

        .game-title {
            font-size: 15px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .game-tag {
            font-size: 11px;
            background: rgba(241, 196, 15, 0.15);
            color: var(--accent-gold);
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        .pvp-tag {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }

        /* أزرار التحكم السفلية */
        .footer-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: linear-gradient(to top, var(--bg-color) 80%, transparent);
        }

        .btn-deposit {
            background: linear-gradient(90deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-deposit:active {
            transform: scale(0.98);
        }

        /* تأثير العمولة الـ VIP */
        .commission-note {
            font-size: 11px;
            color: #627585;
            text-align: center;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>STARS CASINO</h1>
        <p>مرحباً بك في صالة الألعاب الملكية</p>
    </div>

    <div class="user-card">
        <div class="user-info">
            <div class="user-avatar" id="user-avatar">🏆</div>
            <div>
                <span class="user-name" id="user-name">لاعب كازينو</span>
                <span style="display:block; font-size:11px; color:#2ecc71;">● متصل الآن</span>
            </div>
        </div>
        <div class="balance-box">
            <span class="balance-label">الرصيد الملكي</span>
            <span class="balance-value" id="user-balance">0 <span style="font-size:14px;">XTR ⭐</span></span>
        </div>
    </div>

    <div class="section-title">🎯 اختر اللعبة وابدأ التحدي</div>
    
    <div class="games-grid">
        <div class="game-card" onclick="playGame('lucky_wheel')">
            <span class="game-icon">🎡</span>
            <span class="game-title">عجلة الحظ</span>
            <span class="game-tag">فردي</span>
        </div>
        
        <div class="game-card" onclick="playGame('dice_pvp')">
            <span class="game-icon">🎲</span>
            <span class="game-title">تحدي النرد</span>
            <span class="game-tag pvp-tag">لاعب ضد لاعب</span>
        </div>

        <div class="game-card" onclick="playGame('slot_machine')">
            <span class="game-icon">🎰</span>
            <span class="game-title">الslot الملكي</span>
            <span class="game-tag">فردي</span>
        </div>

        <div class="game-card" onclick="playGame('coin_flip_pvp')">
            <span class="game-icon">🪙</span>
            <span class="game-title">ملك أو كتابة</span>
            <span class="game-tag pvp-tag">لاعب ضد لاعب</span>
        </div>
    </div>

    <div style="height: 80px;"></div> <div class="footer-actions">
        <button class="btn-deposit" onclick="requestDeposit()">
            <span>➕ شحن سريع 50 نجمة تليجرام</span>
        </button>
        <span class="commission-note">خصم 3.5% عمولة إدارة الكازينو على ألعاب الـ PvP *</span>
    </div>

    <script>
        // تهيئة واجهة تليجرام وإجبارها تفتح شاشة كاملة
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // جلب بيانات المستخدم الحقيقية من تليجرام وعرضها
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            document.getElementById('user-name').innerText = user.first_name;
            if (user.first_name) {
                document.getElementById('user-avatar').innerText = user.first_name.charAt(0).toUpperCase();
            }
        }

        // إرسال طلب الشحن للبوت
        function requestDeposit() {
            tg.sendData(JSON.stringify({
                action: "deposit",
                amount: 50
            }));
            tg.close();
        }

        // دالة الضغط على الألعاب لإرسال نوع اللعبة للبوت في الشات
        function playGame(gameType) {
            tg.sendData(JSON.stringify({
                action: "play_game",
                game: gameType
            }));
            tg.close();
        }
    </script>
</body>
</html>
