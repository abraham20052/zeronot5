<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>كازينو تليجرام</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffd700;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .container {
            background: #2a2a2a;
            width: 80%;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px #000;
        }
        button {
            background-color: #d4af37;
            border: none;
            color: #000;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }
        #result {
            font-size: 24px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>لعبة الحظ السريع</h1>
        <p>اضغط على الزر لترى ما إذا كنت الفائز اليوم!</p>
        <button onclick="playGame()">اجرب حظي</button>
        <div id="result"></div>
    </div>

    <script>
        function playGame() {
            const outcomes = ["خسرت، حاول مرة أخرى!", "مبروك! ربحت الجائزة الكبرى!"];
            const randomIndex = Math.floor(Math.random() * outcomes.length);
            document.getElementById("result").innerText = outcomes[randomIndex];
        }
    </script>

</body>
</html>
